apiVersion: 1

providers:
  - name: 'Power Dashboards'
    orgId: 1
    folder: 'Power'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 0
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/power
      foldersFromFilesStructure: false
  - name: 'Proxmox Dashboards'
    orgId: 1
    folder: 'Proxmox'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 0
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/proxmox
      foldersFromFilesStructure: false
